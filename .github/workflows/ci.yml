name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Tests (pytest + coverage + flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8
          pip install -r requirements.txt || true
          pip install pytest-homeassistant-custom-component

      - name: Lint with flake8
        run: |
          flake8 custom_components/aflas_dk --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 custom_components/aflas_dk --count --exit-zero --max-complexity=20 --max-line-length=120 --statistics

      - name: Run tests with pytest
        run: |
          pytest -q --disable-warnings --maxfail=1 --cov=custom_components.aflas_dk --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

