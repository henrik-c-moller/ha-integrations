name: HACS Validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install HACS action dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hacs-validator

      - name: Run HACS validation
        run: |
          hacs-validator --action validate

